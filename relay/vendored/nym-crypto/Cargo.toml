optional = true

[dependencies.aes-gcm-siv]
version = "0.11.1"
optional = true

[dependencies.base64]
version = "0.22.1"

[dependencies.blake3]
# Tetherand local patch: upgrade-direction fix for the digest-version
# trait-incoherence. Original upstream `version = "1.7.0"` semver-resolves
# anywhere in [1.7, 2.0). 1.8 adopted digest 0.11 which broke against
# the hmac 0.12 / digest 0.10 callers in nym-sphinx-anonymous-replies.
# Rather than pinning blake3 down to 1.7, we let blake3 stay on the
# 1.8 line and upgrade hmac + digest below to the digest-0.11 era
# (hmac 0.13, digest 0.11), which IS compatible with blake3 1.8.
version = "1.8"
features = ["traits-preview"]
optional = true

[dependencies.bs58]
version = "0.5.1"

[dependencies.cipher]
version = "0.4.3"
optional = true

[dependencies.ctr]
version = "0.9.1"
optional = true

[dependencies.curve25519-dalek]
version = "4.1.3"
optional = true

[dependencies.digest]
# Tetherand local patch: upgrade 0.10.7 → 0.11. The blake3 1.8 release
# adopted digest 0.11 across its trait surface; keeping nym-crypto on
# the digest 0.10 hmac path produced trait-incoherence at every
# nym-sphinx-anonymous-replies call site. hmac 0.13.0 (released
# 2026-03-29) is the matching digest-0.11-era hmac.
version = "0.11"
optional = true

[dependencies.crypto-common]
# Tetherand local patch: digest 0.11 stopped re-exporting
# `crypto_common` (the BlockSizeUser / KeySizeUser trait surface).
# Import the standalone crate directly. Matches digest 0.11's own
# transitive pin (0.2.x line).
version = "0.2"
optional = true

[dependencies.ed25519-dalek]
version = "2.1"
features = ["rand_core"]
optional = true

[dependencies.generic-array]
version = "0.14.7"
optional = true

[dependencies.hkdf]
# Tetherand local patch: hkdf 0.12 also lives on digest 0.10. Upgrade
# to whatever current rev tracks digest 0.11. As of 2026-05-31 the
# RustCrypto org has hkdf 0.13 RCs that are digest-0.11-compatible.
version = "0.13"
optional = true

[dependencies.hmac]
# Tetherand local patch: hmac 0.13.0 (2026-03-29) is the first stable
# release on digest 0.11; matches the trait that blake3 1.8's Hasher
# implements. Upstream nym-crypto 1.21 pins to 0.12.1 which predates
# this coordination.
version = "0.13"
optional = true

[dependencies.jwt-simple]
version = "0.12.12"
features = ["pure-rust"]
optional = true
default-features = false

[dependencies.libcrux-curve25519]
version = "0.0.6"
optional = true

[dependencies.libcrux-psq]
version = "0.0.8"
optional = true

[dependencies.nym-pemstore]
version = "1.21.0"

[dependencies.nym-sphinx-types]
version = "1.21.0"
optional = true

[dependencies.rand]
version = "0.8.5"
optional = true

[dependencies.rand09]
version = "=0.9.2"
optional = true
package = "rand"

[dependencies.serde]
version = "1.0.219"
features = ["derive"]
optional = true

[dependencies.serde_bytes]
version = "0.11.17"
optional = true

[dependencies.sha2]
# Tetherand local patch: upgrade 0.10 → 0.11 to align with the
# digest-0.11 stack (hmac 0.13, hkdf 0.13, blake3 1.8). Mixed
# digest 0.10 and 0.11 in the same graph trips CoreProxy /
# BlockSizeUser bounds at every hkdf/hmac call site.
version = "0.11"
optional = true

[dependencies.subtle-encoding]
version = "0.5"
features = ["bech32-preview"]

[dependencies.thiserror]
version = "2.0"

[dependencies.x25519-dalek]
