[workspace]
resolver = "3"
members = [
    "codec",          # frame codec; used by transport-adb / transport-tcp / Android side
    "transport-api",  # Transport trait
    "transport-adb",  # USB-ADB transport (built but unused by M1's CLI; wired in M2+)
    "transport-tcp",  # TCP/LAN transport with mDNS (same disposition)
    "core",           # forked Gnirehtet relay-rust (Apache-2.0); handles TCP+TUN userspace stack
    "cli",            # `tetherand` binary; M1 wraps core::relay() + adb forward
    "wg",             # M3: BoringTun WireGuard wrapper + JNI bindings for Android
    "tor",            # M6: arti-client embedded + bridges + vanguards + JNI for Android
    "pt-bridge",      # M6.x: PT-spec binary implementing obfs4 + meek + webtunnel
    "transport-bt",   # M2: Bluetooth RFCOMM transport (host Mac discovers Seeker)
    "transport-aoa",  # M2: USB-AOA transport (Mac switches Seeker into accessory mode)
    "nym",            # M5: NymVPN mixnet hop via nym-sdk + JNI for Android
]

[workspace.package]
edition = "2024"
license = "Apache-2.0"
authors = ["pq-cybarg <resistant@tuta.com>"]
rust-version = "1.85"

[workspace.dependencies]
tokio = { version = "1.43", features = ["rt-multi-thread", "net", "io-util", "macros", "sync", "signal", "time"] }
clap = { version = "4.5", features = ["derive", "env"] }
thiserror = "2.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
bytes = "1.9"
byteorder = "1.5"
mdns-sd = "0.13"

[profile.release]
lto = "thin"
codegen-units = 1
# Strip symbols AND debuginfo so the .so contains no panic-location
# source-path strings (those live in .rodata, not .symtab, and survive
# a plain `strip = "symbols"` — leaking the build host's $HOME). Combined
# with the cross-compile scripts' RUSTFLAGS=--remap-path-prefix this gets
# every Android-bound artifact clean of build-host PII.
strip = true
debug = false

# ---------------------------------------------------------------------
# Local fix for the nym-sdk dep-graph collision.
#
# nym-sdk 1.21 transitively pulls `blake3 1.8`, which moved to
# `digest 0.11`. The rest of nym-crypto still uses `hmac` (built on
# `digest 0.10`). The resulting trait incoherence (`Digest` from 0.11
# vs 0.10) breaks the build of `nym-sphinx-anonymous-replies` with
# 5x E0277 / E0599 errors.
#
# Workaround: pin blake3 to the latest version that still uses
# digest 0.10 (the 1.5.x line). Cargo's [patch.crates-io] mechanism
# replaces every transitive use of blake3 across the workspace with
# this pinned version; no upstream code change required, no vendoring,
# no fork maintenance burden.
#
# When upstream nym-sdk coordinates a unified digest version (0.10
# everywhere or 0.11 everywhere), drop this override.
# ---------------------------------------------------------------------
# ---------------------------------------------------------------------
# Local patch for the nym-sdk 1.21 trait-incoherence (blake3 1.8 adopted
# `digest 0.11`, while pervasive nym-crypto callers — nym-sphinx-anonymous-
# replies via hmac — still use `digest 0.10`. Resulting 5x E0277/E0599.
#
# nym-crypto 1.21 declares `blake3 = "1.7.0"` which semver-resolves to
# anything in [1.7, 2.0), letting the resolver pick 1.8.5 in practice.
# Our vendored copy at `relay/vendored/nym-crypto/` tightens the pin to
# exact `=1.7.0` so the resolver stays on the digest-0.10-compatible
# blake3 line. No code changes — only the Cargo.toml version constraint.
#
# Track-upstream procedure: when nym-sdk releases a version that
# coordinates digest crate versions (either bumping hmac to digest 0.11
# OR confirming nym-crypto stays on blake3 < 1.8), drop both this patch
# and the `relay/vendored/nym-crypto/` directory, and bump the
# `nym-sdk` version in `relay/nym/Cargo.toml`.
# ---------------------------------------------------------------------
[patch.crates-io]
nym-crypto = { path = "vendored/nym-crypto" }
# Sibling patch: nym-sphinx-anonymous-replies still imports
# `GenericArray` from the old generic-array crate (typenum-based
# generic array). digest 0.11 returns `hybrid_array::Array` instead.
# Our vendored copy swaps the import + the one type-alias use.
nym-sphinx-anonymous-replies = { path = "vendored/nym-sphinx-anonymous-replies" }
